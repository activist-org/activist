name: ci_services_static_analysis
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "services/**"
  push:
    branches:
      - main
    paths:
      - "services/**"

jobs:
  services_static_analysis:
    name: Run PR Services Static Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/filescan

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      - name: Run Ruff Format - Formatting Check
        run: uv run ruff format .

      - name: Run Ruff - Linting and Import Sorting Check
        if: always()
        run: uv run ruff check .

      - name: Run mypy - Static Type Checking
        if: always()
        run: uv run mypy . --config-file ./pyproject.toml

      - name: Run numpydoc Documentation Check
        if: always()
        run: uv run numpydoc **/*.py
