name: ci_services_pytest
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "services/**"
  push:
    branches:
      - main
    paths:
      - "services/**"
jobs:
  services_tests:
    permissions:
      contents: write
      checks: write
      pull-requests: write
    name: Run PR Services Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/filescan

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      - name: Run pytest - Unit tests with coverage
        if: always()
        run: |
          uv run pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=90 --cov-config=./pyproject.toml -vv

      - name: Run pytest - Integration tests (no coverage gate)
        if: always()
        run: |
          uv run pytest tests_integration/ -vv
