name: ci_filescan

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "services/filescan/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "services/filescan/**"

env:
  SECRET_KEY: "ONLY_FOR_TESTING"
  DATABASE_PORT: 5432
  DATABASE_HOST: localhost
  DATABASE_NAME: postgres
  DATABASE_USER: postgres
  DATABASE_PASSWORD: postgres
  FILESCAN_PORT: 9101

jobs:
  filescan-integration:
    name: Run Filescan Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ env.DATABASE_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: uv sync --frozen --all-extras

      - name: Build and start filescan service
        working-directory: .
        run: |
           docker compose -f docker-compose.yml up -d filescan

      - name: Wait for filescan health
        working-directory: .
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:${FILESCAN_PORT}/health" > /dev/null; then
              echo "filescan is healthy"
              exit 0
            fi
            echo "waiting for filescan..."
            sleep 2
          done
          echo "filescan did not become healthy in time"
          exit 1

      - name: Run filescan-related backend tests
        working-directory: ./backend
        run: |
          uv run pytest \
            content/tests/filescan/test_image_filescan_integration.py \
            content/tests/image/test_image_icon_create.py \
            -vv
